<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh; width: 100vw;
      background: #000 url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1920') center/cover;
      display: flex; align-items: flex-end; justify-content: flex-end;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: default;
    }
    .indicator {
      position: fixed; top: 14px; right: 14px;
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
      padding: 6px 10px; border-radius: 20px;
      color: #fff; font-size: 11px; letter-spacing: 0.5px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e53e3e; box-shadow: 0 0 8px #e53e3e;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
    .exit {
      position: fixed; top: 14px; left: 14px;
      background: rgba(0,0,0,0.45); color: #fff; border: none;
      padding: 6px 12px; border-radius: 20px; font-size: 11px;
      cursor: pointer; opacity: 0; transition: opacity 0.2s;
    }
    body:hover .exit { opacity: 1; }
  </style>
</head>
<body>
  <button class="exit" onclick="window.spyme.exitCover()">Exit Cover Mode</button>
  <div class="indicator">
    <span class="dot"></span>
    <span>SPYME monitoring</span>
  </div>
</body>
</html>
